name: Deploy to GitHub Pages

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24.x"
            - name: Install
              run: cd ./cat-blog && npm install
            - name: Build
              run: cd ./cat-blog && npm run build
            - name: Deploy
              run: cd ./cat-blog && npm run deploy
              env:
                  CI: true
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
